name: 水质数据抓取

on:
  schedule:
    # 每2小时运行一次（UTC 时间，对应北京时间偶数整点）
    - cron: '0 */2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout data 分支
        uses: actions/checkout@v4
        with:
          ref: data
          fetch-depth: 0

      - name: 从 main 分支同步最新脚本
        run: |
          git fetch origin main
          git checkout origin/main -- scrape_water_quality.py requirements.txt

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests urllib3

      - name: 运行抓取脚本
        run: python scrape_water_quality.py

      - name: 提交并推送数据到 data 分支
        run: |
          git add -A "National Water Quality/"
          if git diff --cached --quiet; then
            echo "无新数据，跳过提交"
          else
            git commit -m "水质数据更新：自动抓取"
          fi
          git push origin data
