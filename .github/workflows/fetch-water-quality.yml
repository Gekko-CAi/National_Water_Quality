name: 水质数据抓取

on:
  schedule:
    # 每2小时运行一次（UTC 时间，对应北京时间偶数点整点）
    - cron: '0 */2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 切换到 data 分支
        run: |
          git fetch origin
          if git ls-remote --heads origin data | grep -q .; then
            git checkout -B data origin/data
          else
            git checkout -b data
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests urllib3

      - name: 运行抓取脚本
        run: python scrape_water_quality.py

      - name: 提交并推送变更到 data 分支
        run: |
          git add -A 数据文件/
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "水质数据按天更新（北京时间CSV）"
          fi
          git push origin HEAD:data
