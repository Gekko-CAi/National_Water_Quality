name: 水质数据抓取

on:
  schedule:
    # 每2小时运行一次（UTC 时间）
    - cron: '0 */2 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: pip install requests urllib3 openpyxl

      - name: 运行抓取脚本
        run: python scrape_water_quality.py

      - name: 清理旧数据文件（只保留最新一份）
        run: |
          cd 数据文件
          # 按文件修改时间倒序排列，保留第一个（最新），删除其余
          ls -t *.xlsx 2>/dev/null | tail -n +2 | xargs -r rm -f
          cd ..

      - name: 提交并推送清理后的变更
        run: |
          git add -A 数据文件/
          if git diff --cached --quiet; then
            echo "无变化，跳过提交"
          else
            git commit -m "清理历史水质数据文件，只保留最新一份"
            git push origin HEAD
          fi
